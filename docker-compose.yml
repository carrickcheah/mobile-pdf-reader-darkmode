services:
  pdf-dark:
    build: .
    container_name: pdf-dark
    restart: unless-stopped
    ports:
      - "3099:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.1"
