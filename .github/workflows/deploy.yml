name: Deploy to Azure VM

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          script: |
            set -e
            APP_DIR="/app/pdf_dark"

            # First-time setup: clone if not exists
            if [ ! -d "$APP_DIR" ]; then
              echo "=== First deploy — cloning repo ==="
              sudo mkdir -p /app
              sudo chown $(whoami):$(whoami) /app
              git clone https://github.com/carrickcheah/mobile-pdf-reader-darkmode.git "$APP_DIR"
            fi

            cd "$APP_DIR"

            # Pull latest
            echo "=== Pulling latest code ==="
            git pull origin main

            # Build and deploy
            echo "=== Building container ==="
            docker compose build

            echo "=== Starting container ==="
            docker compose up -d

            # Health check
            echo "=== Health check ==="
            sleep 5
            if curl -sf http://127.0.0.1:3099/ > /dev/null; then
              echo "DEPLOYED — app is live on port 3099"
            else
              echo "HEALTH CHECK FAILED"
              docker compose logs --tail=30
              exit 1
            fi

            # Cleanup
            docker image prune -f --filter "until=24h" || true
            echo "=== Done ==="
